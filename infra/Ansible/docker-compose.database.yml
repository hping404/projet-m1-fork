services:
  mysql:
    image: mysql:8.0
    container_name: wave-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-wave23}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-wave}
      MYSQL_USER: ${MYSQL_USER:-wave-user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-wave23}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-wave23}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - database_network

  redis:
    image: redis:7-alpine
    container_name: wave-redis
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - database_network

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  database_network:
    driver: bridge
