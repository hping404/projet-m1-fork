# ===========================================
# DEPLOYMENT : Laravel Application (wave-app)
# Backend PHP-FPM - se connecte à MySQL/Redis externes
# ===========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wave-app
  labels:
    app: wave-app
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wave-app
  template:
    metadata:
      labels:
        app: wave-app
        tier: backend
    spec:
      containers:
        - name: wave-app
          image: abdoulie/wave-image:latest
          imagePullPolicy: Always
          workingDir: /var/www/wave
          ports:
            - containerPort: 9000
          envFrom:
            - configMapRef:
                name: wave-env
            - secretRef:
                name: wave-secrets
          volumeMounts:
            - name: wave-storage
              mountPath: /var/www/wave/storage
            - name: wave-cache
              mountPath: /var/www/wave/bootstrap/cache
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            tcpSocket:
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            tcpSocket:
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
      volumes:
        - name: wave-storage
          persistentVolumeClaim:
            claimName: wave-storage-pvc
        - name: wave-cache
          persistentVolumeClaim:
            claimName: wave-cache-pvc

---

# ===========================================
# DEPLOYMENT : NGINX Web Server (wave-nginx)
# Frontend - reverse proxy vers PHP-FPM
# ===========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wave-nginx
  labels:
    app: wave-nginx
    tier: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wave-nginx
  template:
    metadata:
      labels:
        app: wave-nginx
        tier: frontend
    spec:
      initContainers:
        - name: copy-static-files
          image: abdoulie/wave-image:latest
          command: ['sh', '-c', 'cp -r /var/www/wave/public /shared/public']
          volumeMounts:
            - name: shared-public
              mountPath: /shared
      containers:
        - name: wave-nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: shared-public
              mountPath: /var/www/wave/public
              subPath: public
            - name: wave-storage
              mountPath: /var/www/wave/storage
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
      volumes:
        - name: nginx-config
          configMap:
            name: wave-nginx-config
        - name: shared-public
          emptyDir: {}
        - name: wave-storage
          persistentVolumeClaim:
            claimName: wave-storage-pvc
