# ===========================================
# SERVICES : Exposition des pods
# MySQL et Redis sont externes (Docker Compose sur serveur Database)
# ===========================================

# Service PHP-FPM (wave-app) - Backend
apiVersion: v1
kind: Service
metadata:
  name: wave-app
  labels:
    app: wave-app
    tier: backend
spec:
  selector:
    app: wave-app
  ports:
    - name: php-fpm
      protocol: TCP
      port: 9000
      targetPort: 9000
  type: ClusterIP

---

# Service Nginx (wave-nginx) - Frontend
apiVersion: v1
kind: Service
metadata:
  name: wave-nginx
  labels:
    app: wave-nginx
    tier: frontend
spec:
  selector:
    app: wave-nginx
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
  type: LoadBalancer
