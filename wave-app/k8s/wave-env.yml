# ===========================================
# CONFIGMAP : Variables d'environnement Laravel
# MySQL et Redis sont sur le serveur Database (externe au cluster K8s)
# ===========================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: wave-env
data:
  # Application Laravel
  APP_NAME: "Wave"
  APP_ENV: "production"
  APP_DEBUG: "false"
  APP_URL: "http://wave.local"
  
  # Base de données externe (serveur Database - Docker Compose)
  # IMPORTANT: Remplacer DATABASE_SERVER_IP par l'IP du serveur Database
  DB_CONNECTION: "mysql"
  DB_HOST: "DATABASE_SERVER_IP"
  DB_PORT: "3306"
  DB_DATABASE: "wave"
  DB_USERNAME: "wave-user"
  
  # Redis externe (serveur Database - Docker Compose)
  REDIS_HOST: "DATABASE_SERVER_IP"
  REDIS_PORT: "6379"
  REDIS_PASSWORD: ""
  
  # Cache & Session
  CACHE_DRIVER: "redis"
  SESSION_DRIVER: "redis"
  QUEUE_CONNECTION: "redis"
  
  # Logging
  LOG_CHANNEL: "stderr"
  LOG_LEVEL: "info"
